<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>割合の暗算トレーニング 発展編</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Meiryo', sans-serif;
  background: #F7F6F2;
  color: #1a1a1a;
  min-height: 100vh;
  padding: 16px;
}
.container { max-width: 600px; margin: 0 auto; }
.app-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0 16px;
  border-bottom: 1px solid #E0DED8;
  margin-bottom: 20px;
}
.app-title { font-size: 17px; font-weight: 700; color: #1a1a1a; letter-spacing: 0.03em; }
.stock-badge {
  display: flex; align-items: center; gap: 6px;
  background: #FFF3E0; color: #E65100;
  font-size: 13px; font-weight: 600;
  padding: 5px 12px; border-radius: 20px;
  border: 1px solid #FFCC80;
  cursor: pointer; transition: background 0.15s;
}
.stock-badge:hover { background: #FFE0B2; }
.stock-dot { width: 8px; height: 8px; background: #E65100; border-radius: 50%; }
.sync-status {
  font-size: 11px; color: #999; text-align: right;
  margin-bottom: 12px; min-height: 16px;
}
.sync-status.ok  { color: #4CAF50; }
.sync-status.err { color: #E53935; }
.mode-screen { padding: 8px 0; }
.mode-label { font-size: 12px; font-weight: 600; color: #888; letter-spacing: 0.08em; margin-bottom: 12px; }
.mode-card {
  background: #fff; border: 1px solid #E0DED8; border-radius: 14px;
  padding: 18px 20px; margin-bottom: 10px; cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
  display: flex; align-items: center; gap: 14px;
}
.mode-card:hover { border-color: #4A90D9; box-shadow: 0 2px 8px rgba(74,144,217,0.12); }
.mode-icon {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.mode-icon.normal { background: #E8F4FD; }
.mode-icon.review { background: #FFF3E0; }
.mode-info { flex: 1; }
.mode-name { font-size: 16px; font-weight: 700; margin-bottom: 3px; }
.mode-desc { font-size: 13px; color: #666; line-height: 1.5; }
.mode-card.disabled { opacity: 0.4; cursor: default; }
.mode-card.disabled:hover { border-color: #E0DED8; box-shadow: none; }
.empty-hint { font-size: 13px; color: #999; text-align: center; padding: 8px 0 0; }
.progress-wrap { margin-bottom: 16px; }
.progress-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.progress-mode { font-size: 12px; font-weight: 600; color: #888; letter-spacing: 0.06em; }
.progress-count { font-size: 13px; color: #555; }
.progress-bar { height: 5px; background: #E0DED8; border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: #4A90D9; border-radius: 3px; transition: width 0.3s ease; }
.progress-fill.review { background: #E65100; }
.question-card {
  background: #fff; border: 1px solid #E0DED8; border-radius: 16px;
  padding: 24px 20px; margin-bottom: 12px; text-align: center;
}
.level-pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: #EEF2FF; color: #3730A3;
  font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
  padding: 4px 12px; border-radius: 20px; margin-bottom: 16px;
}
.question-text { font-size: 22px; line-height: 1.7; color: #1a1a1a; font-weight: 600; }
.answer-reveal-box {
  background: #fff; border: 1px solid #E0DED8; border-radius: 16px;
  padding: 20px; margin-bottom: 12px;
}
.answer-row {
  display: flex; align-items: baseline; justify-content: center; gap: 10px;
  margin-bottom: 14px;
}
.answer-label { font-size: 13px; color: #888; font-weight: 600; }
.answer-value { font-size: 32px; font-weight: 800; color: #1a1a1a; }
.hint-box {
  background: #F5F9FE; border: 1px solid #D6E8FB; border-radius: 12px;
  padding: 14px 16px; font-size: 14px; line-height: 1.8; color: #2C4A6E;
}
.hint-label { font-size: 12px; font-weight: 700; color: #4A90D9; margin-bottom: 6px; letter-spacing: 0.06em; }
.choices { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
.choice-btn {
  background: #fff; border: 1.5px solid #D8D6D0;
  border-radius: 12px; padding: 13px 16px;
  font-size: 16px; color: #1a1a1a;
  text-align: left; cursor: pointer;
  display: flex; align-items: center; gap: 12px;
  transition: border-color 0.15s, background 0.15s;
  font-family: inherit;
}
.choice-btn:hover:not(:disabled) { border-color: #4A90D9; background: #F5F9FE; }
.choice-btn:disabled { cursor: default; }
.choice-btn.correct { background: #F0FAF0; border-color: #4CAF50; color: #1B5E20; }
.choice-btn.wrong   { background: #FFF0F0; border-color: #E53935; color: #7F0000; }
.self-check-row { display: flex; gap: 10px; margin-bottom: 12px; }
.self-check-btn {
  flex: 1; border-radius: 12px; padding: 16px; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: inherit; border: 1.5px solid; transition: background 0.15s;
}
.self-check-btn.ok {
  background: #F0FAF0; border-color: #A5D6A7; color: #1B5E20;
}
.self-check-btn.ok:hover { background: #E2F5E2; }
.self-check-btn.ng {
  background: #FFF0F0; border-color: #FFCDD2; color: #7F0000;
}
.self-check-btn.ng:hover { background: #FFE2E2; }
.result-box {
  border-radius: 12px; padding: 16px 18px; margin-bottom: 12px;
  font-size: 14px; line-height: 1.9;
}
.result-box.correct-box { background: #F0FAF0; border: 1px solid #A5D6A7; color: #1B5E20; }
.result-box.wrong-box   { background: #FFF0F0; border: 1px solid #FFCDD2; color: #7F0000; }
.result-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.action-row { display: flex; flex-direction: column; gap: 8px; }
.btn-primary {
  background: #1a1a1a; color: #fff;
  border: none; border-radius: 12px;
  padding: 14px; font-size: 15px; font-weight: 600;
  cursor: pointer; width: 100%; font-family: inherit;
  transition: background 0.15s;
}
.btn-primary:hover { background: #333; }
.btn-secondary {
  background: #fff; color: #1a1a1a;
  border: 1.5px solid #D8D6D0; border-radius: 12px;
  padding: 12px; font-size: 14px; font-weight: 500;
  cursor: pointer; width: 100%; font-family: inherit;
  transition: background 0.15s, border-color 0.15s;
}
.btn-secondary:hover { background: #F5F4F0; border-color: #B0AEA8; }
.btn-stock {
  background: #FFF3E0; color: #E65100;
  border: 1.5px solid #FFCC80; border-radius: 12px;
  padding: 12px; font-size: 14px; font-weight: 600;
  cursor: pointer; width: 100%; font-family: inherit;
  transition: background 0.15s;
}
.btn-stock:hover { background: #FFE0B2; }
.btn-unstock {
  background: #F5F4F0; color: #888;
  border: 1.5px solid #D8D6D0; border-radius: 12px;
  padding: 12px; font-size: 14px; font-weight: 500;
  cursor: pointer; width: 100%; font-family: inherit;
  transition: background 0.15s;
}
.btn-unstock:hover { background: #E8E6E0; }
.score-screen {
  background: #fff; border: 1px solid #E0DED8; border-radius: 16px;
  padding: 32px 24px; text-align: center; margin-bottom: 16px;
}
.score-number { font-size: 56px; font-weight: 800; color: #1a1a1a; line-height: 1; }
.score-denom  { font-size: 20px; color: #999; margin-bottom: 6px; }
.score-msg    { font-size: 16px; color: #444; margin-bottom: 24px; }
.score-sub-title { font-size: 13px; font-weight: 700; color: #888; letter-spacing: 0.06em; margin-bottom: 12px; text-align: left; }
.stock-list-item {
  display: flex; align-items: center; justify-content: space-between;
  background: #F9F8F5; border-radius: 10px; padding: 12px 14px;
  margin-bottom: 8px; font-size: 14px;
}
.stock-item-q { color: #555; font-size: 13px; flex: 1; padding-right: 10px; }
.btn-remove-stock {
  background: none; border: 1px solid #D8D6D0; border-radius: 8px;
  padding: 4px 10px; font-size: 12px; color: #888; cursor: pointer;
  font-family: inherit; flex-shrink: 0;
}
.btn-remove-stock:hover { background: #F0EEE8; color: #555; }
.empty-stock { text-align: center; color: #aaa; font-size: 14px; padding: 16px 0; }
.loading-screen { text-align: center; padding: 60px 20px; color: #888; font-size: 15px; }
.spinner {
  display: inline-block; width: 24px; height: 24px;
  border: 2px solid #E0DED8; border-top-color: #4A90D9;
  border-radius: 50%; animation: spin 0.8s linear infinite;
  margin-bottom: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

// ============================================================
// ストック管理（GAS と同期、教科別キーで保存）
// ============================================================
let stockedIds = new Set();

function setSyncStatus(msg, type) {
  const el = document.getElementById('syncStatus');
  el.textContent = msg;
  el.className = 'sync-status' + (type ? ' ' + type : '');
}

async function loadStock() {
  try {
    setSyncStatus('ストックを読み込み中…');
    const res = await fetch(GAS_URL + '&action=load');
    const text = await res.text();
    const arr = JSON.parse(text);
    stockedIds = new Set(Array.isArray(arr) ? arr : []);
    setSyncStatus('✓ ストックを読み込みました', 'ok');
    document.getElementById('stockCount').textContent = stockedIds.size;
    setTimeout(() => setSyncStatus(''), 2000);
  } catch(e) {
    setSyncStatus('ストックの読み込みに失敗しました（オフライン？）', 'err');
    stockedIds = new Set();
  }
}

async function saveStock() {
  document.getElementById('stockCount').textContent = stockedIds.size;
  try {
    const data = JSON.stringify([...stockedIds]);
    await fetch(GAS_URL + '&action=save&data=' + encodeURIComponent(data));
    setSyncStatus('✓ ストックを保存しました', 'ok');
    setTimeout(() => setSyncStatus(''), 2000);
  } catch(e) {
    setSyncStatus('保存に失敗しました（オフライン？）', 'err');
  }
}

// ============================================================
// クイズ本体
// ============================================================
const TOTAL = 5;
let mode = 'home';
let questions = [];
let current = 0;
let score = 0;
let answered = false;
let revealed = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function render(html) { document.getElementById('root').innerHTML = html; }

function goHome() { mode = 'home'; renderHome(); }

function renderHome() {
  const stockCount = stockedIds.size;
  const disabledClass = stockCount === 0 ? 'disabled' : '';
  const disabledAttr  = stockCount === 0 ? '' : 'onclick="startReview()"';
  render(`
    <div class="mode-screen">
      <div class="mode-label">モードをえらぶ</div>
      <div class="mode-card" onclick="startNormal()">
        <div class="mode-icon normal">🧮</div>
        <div class="mode-info">
          <div class="mode-name">通常モード</div>
          <div class="mode-desc">問題からランダムに5問出題します</div>
        </div>
      </div>
      <div class="mode-card ${disabledClass}" ${disabledAttr}>
        <div class="mode-icon review">📌</div>
        <div class="mode-info">
          <div class="mode-name">復習モード</div>
          <div class="mode-desc">ストックした問題（${stockCount}問）を練習します</div>
        </div>
      </div>
      ${stockCount === 0 ? '<p class="empty-hint">まちがえた問題や「もう一度やりたい」問題がここに集まります</p>' : ''}
    </div>
  `);
}

function startNormal() {
  mode = 'normal';
  questions = shuffle(ALL_QUESTIONS).slice(0, TOTAL);
  current = 0; score = 0; answered = false;
  renderQuestion();
}

function startReview() {
  mode = 'review';
  const stockedQs = ALL_QUESTIONS.filter(q => stockedIds.has(q.id));
  questions = shuffle(stockedQs).slice(0, Math.min(TOTAL, stockedQs.length));
  current = 0; score = 0; answered = false;
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  revealed = false;
  const q = questions[current];
  const pct = Math.round((current / questions.length) * 100);
  const modeLabel = mode === 'review' ? '復習モード' : '通常モード';
  const fillClass = mode === 'review' ? 'review' : '';
  const levelLabel = q.level === 2 ? '切りにくい数値' : q.level === 3 ? '2ステップ計算' : '基本';
  render(`
    <div class="progress-wrap">
      <div class="progress-row">
        <span class="progress-mode">${modeLabel}</span>
        <span class="progress-count">${current+1} / ${questions.length}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill ${fillClass}" style="width:${pct}%"></div></div>
    </div>
    <div class="question-card">
      <span class="level-pill">${levelLabel}</span>
      <p class="question-text">${q.question}</p>
    </div>
    <div id="result">
      <button class="btn-primary" onclick="revealAnswer()">頭の中で答えを出したら、こたえを見る</button>
    </div>
  `);
}

function revealAnswer() {
  if (revealed) return;
  revealed = true;
  const q = questions[current];
  render(`
    <div class="progress-wrap">
      <div class="progress-row">
        <span class="progress-mode">${mode === 'review' ? '復習モード' : '通常モード'}</span>
        <span class="progress-count">${current+1} / ${questions.length}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill ${mode === 'review' ? 'review' : ''}" style="width:${Math.round((current / questions.length) * 100)}%"></div></div>
    </div>
    <div class="question-card">
      <span class="level-pill">${q.level === 2 ? '切りにくい数値' : q.level === 3 ? '2ステップ計算' : '基本'}</span>
      <p class="question-text">${q.question}</p>
    </div>
    <div class="answer-reveal-box">
      <div class="answer-row">
        <span class="answer-label">答え</span>
        <span class="answer-value">${q.answer}</span>
      </div>
      <div class="hint-box">
        <div class="hint-label">考え方</div>
        ${q.hint}
      </div>
    </div>
    <div id="result">
      <p style="text-align:center; font-size:14px; color:#888; margin-bottom:10px;">頭の中で出した答えと合っていましたか？</p>
      <div class="self-check-row">
        <button class="self-check-btn ok" onclick="selectAnswer(true)">⭕ 合ってた</button>
        <button class="self-check-btn ng" onclick="selectAnswer(false)">❌ 間違えた</button>
      </div>
    </div>
  `);
}

function selectAnswer(isCorrect) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  if (isCorrect) score++;

  if (!isCorrect) { stockedIds.add(q.id); saveStock(); }

  const isStocked = stockedIds.has(q.id);
  const isLast = current === questions.length - 1;
  const boxClass = isCorrect ? 'correct-box' : 'wrong-box';
  const titleText = isCorrect ? '✓ よくできました！' : '✗ もう一度練習しよう';

  const stockBtn = isStocked
    ? `<button class="btn-unstock" onclick="toggleStock('${q.id}', false)">📌 ストックから外す</button>`
    : `<button class="btn-stock"   onclick="toggleStock('${q.id}', true)">📌 もう一度やりたい（ストックに追加）</button>`;

  document.getElementById('result').innerHTML = `
    <div class="result-box ${boxClass}">
      <div class="result-title">${titleText}</div>
    </div>
    <div class="action-row">
      ${stockBtn}
      <button class="btn-primary" onclick="${isLast ? 'showScore()' : 'nextQuestion()'}">${isLast ? '結果を見る' : `次の問題へ　(${current+2}/${questions.length})`}</button>
    </div>
  `;
}

function toggleStock(id, add) {
  if (add) stockedIds.add(id); else stockedIds.delete(id);
  saveStock();
  const btn = document.querySelector('.btn-stock, .btn-unstock');
  if (!btn) return;
  if (add) {
    btn.className = 'btn-unstock';
    btn.textContent = '📌 ストックから外す';
    btn.setAttribute('onclick', `toggleStock('${id}', false)`);
  } else {
    btn.className = 'btn-stock';
    btn.textContent = '📌 もう一度やりたい（ストックに追加）';
    btn.setAttribute('onclick', `toggleStock('${id}', true)`);
  }
}

function nextQuestion() { current++; renderQuestion(); }

function showScore() {
  const pct = Math.round(score / questions.length * 100);
  const msg = pct===100 ? 'かんぺき！全問正解！'
    : pct>=80 ? 'すごい！よくできました！'
    : pct>=60 ? 'がんばりました！あと少し！'
    : 'また練習しよう！きっとできるよ！';

  const stockedQs = ALL_QUESTIONS.filter(q => stockedIds.has(q.id));
  const stockListHtml = stockedQs.length === 0
    ? '<div class="empty-stock">ストックはありません</div>'
    : stockedQs.map(q => `
        <div class="stock-list-item">
          <span class="stock-item-q">${q.question}</span>
          <button class="btn-remove-stock" onclick="removeFromStock('${q.id}')">外す</button>
        </div>`).join('');

  render(`
    <div class="score-screen">
      <div class="score-number">${score}</div>
      <div class="score-denom">/ ${questions.length}問正解</div>
      <div class="score-msg">${msg}</div>
      <div class="action-row">
        ${stockedIds.size > 0 ? `<button class="btn-primary" onclick="startReview()">📌 ストックした問題を復習する（${stockedIds.size}問）</button>` : ''}
        <button class="btn-secondary" onclick="startNormal()">通常モードで続ける</button>
        <button class="btn-secondary" onclick="goHome()">トップにもどる</button>
      </div>
    </div>
    <div>
      <div class="score-sub-title">📌 ストック中の問題</div>
      ${stockListHtml}
    </div>
  `);
}

function removeFromStock(id) {
  stockedIds.delete(id);
  saveStock();
  showScore();
}

// 起動時にストックを読み込む
render('<div class="loading-screen"><div class="spinner"></div><br>読み込み中…</div>');
loadStock().then(() => renderHome());
</script>
